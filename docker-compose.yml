services:
  postgres:
    image: postgres:16-alpine
    container_name: scht-db
    environment:
      POSTGRES_DB: scht
      POSTGRES_USER: scht
      POSTGRES_PASSWORD: scht_password
    volumes:
      - scht_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scht"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scht-backend
    environment:
      DATABASE_URL: postgresql://scht:scht_password@postgres:5432/scht
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: scht
    ports:
      - "3002:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  scht_pgdata:
